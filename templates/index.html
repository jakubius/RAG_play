<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Local PDF RAG</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121932;
      --panel-2: #1a2345;
      --text: #eef2ff;
      --muted: #a9b4d0;
      --accent: #4f7cff;
      --border: #2a3768;
      --user: #1d3f91;
      --bot: #1b274d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #101733 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px; }
    .title { font-size: 32px; margin: 0 0 6px; }
    .subtitle { color: var(--muted); margin: 0 0 18px; }
    .chat {
      background: rgba(18, 25, 50, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }
    .messages {
      height: 65vh;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .msg {
      max-width: 82%;
      padding: 14px 16px;
      border-radius: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .user { align-self: flex-end; background: var(--user); }
    .bot { align-self: flex-start; background: var(--bot); }
    .meta { font-size: 13px; color: var(--muted); margin-top: 8px; }
    .image-link {
      display: inline-block;
      margin-top: 10px;
      color: #bcd0ff;
      text-decoration: none;
    }
    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 16px;
      border-top: 1px solid var(--border);
      background: var(--panel-2);
    }
    textarea {
      resize: none;
      min-height: 58px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #0d1430;
      color: var(--text);
      padding: 14px;
      font: inherit;
      outline: none;
    }
    button {
      border: none;
      border-radius: 14px;
      padding: 0 18px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
      min-width: 110px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">Local PDF RAG</h1>
    <p class="subtitle">Ask questions about your PDF and open the best matching page image.</p>

    <div class="chat">
      <div id="messages" class="messages">
        <div class="msg bot">Hi — ask me anything about the PDF.</div>
      </div>

      <form id="chatForm" class="composer">
        <textarea id="question" placeholder="Ask a question about the PDF..." required></textarea>
        <button id="sendBtn" type="submit">Send</button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById("chatForm");
    const input = document.getElementById("question");
    const messages = document.getElementById("messages");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(text, role, metaHtml="") {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.innerHTML = text.replace(/\\n/g, "<br>") + metaHtml;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, "user");
      input.value = "";
      sendBtn.disabled = true;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });

        const data = await res.json();

        if (!res.ok) {
          addMessage(data.error || "Something went wrong.", "bot");
        } else {
          let meta = "";
          if (data.page) meta += `<div class="meta">Best matching page: ${data.page}</div>`;
          if (data.image_url) meta += `<a class="image-link" href="${data.image_url}" target="_blank" rel="noopener noreferrer">Open page image</a>`;
          addMessage(data.answer, "bot", meta);
        }
      } catch (err) {
        addMessage("Failed to contact the local RAG app.", "bot");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
